<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay School Fees</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Paystack Inline JS Library -->
    <script src="https://js.paystack.co/v1/inline.js"></script> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .header-nav { background-color: #28a745; }
        .section-card { background-color: white; }
        .btn-primary { background-color: #28a745; }
        .btn-primary:hover { background-color: #218838; }
        .input-field { border-color: #d1d5db; }
        .input-field:focus { border-color: #28a745; box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.25); }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #28a745;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">
    <!-- Navigation -->
    <header class="header-nav text-white shadow-lg">
        <div class="container mx-auto p-4 flex justify-between items-center">
            <a href="student-dashboard.html" class="flex items-center gap-2 hover:bg-white/10 p-2 rounded-lg transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span class="font-semibold">Back to Dashboard</span>
            </a>
            <h1 class="text-2xl font-bold">School Fees Payment</h1>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-20">
            <div class="loader mx-auto"></div>
            <p class="mt-4 text-gray-500">Loading your financial details...</p>
        </div>

        <!-- Main Content (Initially Hidden) -->
        <div id="mainContent" class="hidden max-w-2xl mx-auto">
            <div class="section-card p-8 rounded-2xl shadow-lg">
                <div class="text-center mb-6">
                    <h2 class="text-3xl font-bold text-gray-900">Pay Your Fees</h2>
                    <p class="text-gray-500 mt-1">Settle your outstanding school fees securely online.</p>
                </div>

                <!-- Financial Summary -->
                <div class="bg-gray-50 p-6 rounded-xl border mb-8 space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">Total Fees Due:</span>
                        <span id="totalFees" class="font-bold text-lg">₦0.00</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-600">Amount Paid:</span>
                        <span id="amountPaid" class="font-bold text-lg text-green-600">₦0.00</span>
                    </div>
                    <hr class="border-dashed">
                    <div class="flex justify-between items-center">
                        <span class="font-semibold text-lg">Balance Remaining:</span>
                        <span id="balanceDue" class="font-bold text-xl text-red-600">₦0.00</span>
                    </div>
                </div>

                <!-- Payment Form -->
                <div class="space-y-4">
                    <div>
                        <label for="paymentAmount" class="block text-sm font-medium text-gray-600 mb-1">Amount to Pay (₦)</label>
                        <input type="number" id="paymentAmount" placeholder="Enter amount" class="input-field w-full p-4 rounded-lg text-lg font-semibold">
                    </div>
                    <button id="payBtn" class="btn-primary w-full text-white font-bold py-4 px-6 rounded-lg transition text-lg flex items-center justify-center gap-2" disabled>
                        <span>Proceed to Payment</span>
                        <i data-lucide="lock" class="w-5 h-5"></i>
                    </button>
                    <p id="paymentError" class="text-center text-sm text-red-500 h-5"></p>
                </div>
            </div>
        </div>
    </main>

<script>
// --- GLOBAL SETUP ---
const SUPABASE_URL = 'https://lxjclssfgqalcpilheet.supabase.co'; // <-- IMPORTANT: REPLACE
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4amNsc3NmZ3FhbGNwaWxoZWV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc4MDQwNTYsImV4cCI6MjA3MzM4MDA1Nn0.y-AY6DnfINAEl9jcNXoq32l7CyNEBp0o-Ne-Fniwais'; // <-- IMPORTANT: REPLACE
const PAYSTACK_PUBLIC_KEY = 'YOUR_PAYSTACK_PUBLIC_KEY'; // <-- IMPORTANT: REPLACE
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Helper to format currency
const formatCurrency = (amount) => new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN' }).format(amount);

class FeesManager {
    constructor() {
        this.student = null;
        this.balanceDue = 0;
        this.paymentAmount = 0;
    }

    async initialize() {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.href = 'student-signin.html';
            return;
        }
        
        try {
            // Use the database function to get all financial details at once
            const { data, error } = await supabase
                .rpc('get_student_financials', { student_id: session.user.id })
                .single();

            if (error) throw error;
            
            this.student = data;
            this.balanceDue = parseFloat(data.balance_due);
            this.render();
            this.setupEventListeners();

        } catch (error) {
            document.getElementById('loadingState').innerHTML = `<p class="text-red-500">Error: Could not load your details. ${error.message}</p>`;
        }
    }

    render() {
        document.getElementById('totalFees').textContent = formatCurrency(this.student.total_fees_due);
        document.getElementById('amountPaid').textContent = formatCurrency(this.student.fees_paid);
        document.getElementById('balanceDue').textContent = formatCurrency(this.balanceDue > 0 ? this.balanceDue : 0);
        
        const paymentAmountInput = document.getElementById('paymentAmount');
        // Pre-fill the input with the remaining balance
        if (this.balanceDue > 0) {
            paymentAmountInput.value = this.balanceDue;
            this.paymentAmount = this.balanceDue;
        }

        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        lucide.createIcons();
        this.checkCanPay();
    }

    setupEventListeners() {
        document.getElementById('paymentAmount').addEventListener('input', (e) => {
            this.paymentAmount = parseFloat(e.target.value) || 0;
            this.checkCanPay();
        });
        document.getElementById('payBtn').addEventListener('click', () => this.startPaystackPayment());
    }

    checkCanPay() {
        const payBtn = document.getElementById('payBtn');
        const paymentError = document.getElementById('paymentError');
        paymentError.textContent = '';
        
        if (this.paymentAmount <= 0) {
            payBtn.disabled = true;
        } else if (this.paymentAmount > this.balanceDue) {
            payBtn.disabled = true;
            paymentError.textContent = 'Payment cannot exceed the balance due.';
        } else {
            payBtn.disabled = false;
        }
    }

    startPaystackPayment() {
        if (PAYSTACK_PUBLIC_KEY === 'YOUR_PAYSTACK_PUBLIC_KEY') {
            Swal.fire('Configuration Error', 'Paystack has not been configured correctly.', 'error');
            return;
        }

        const handler = PaystackPop.setup({
            key: PAYSTACK_PUBLIC_KEY,
            email: this.student.email,
            amount: this.paymentAmount * 100, // Amount in kobo
            currency: 'NGN',
            ref: `STU_${this.student.admission_number}_${Date.now()}`,
            metadata: {
                student_id: this.student.id, // Supabase user ID
                student_name: `${this.student.first_name} ${this.student.last_name}`,
                description: `School fees payment for ${this.student.student_class}`
            },
            callback: (response) => {
                // This function is called after a successful Paystack transaction
                this.verifyPaymentWithBackend(response.reference);
            },
            onClose: () => {
                Swal.fire('Cancelled', 'You have cancelled the payment process.', 'info');
            }
        });
        handler.openIframe();
    }

        // This is the new, LIVE version of the function
    async verifyPaymentWithBackend(reference) {
        Swal.fire({
            title: 'Verifying Payment...',
            text: 'Please wait, this may take a few seconds.',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading() }
        });

        try {
            // Get the user's current session token for secure authentication
            const { data: { session }, error: sessionError } = await supabase.auth.getSession();
            if (sessionError || !session) throw new Error("Your session has expired. Please log in again.");
            
            // Call the REAL Supabase Edge Function
            const { data, error } = await supabase.functions.invoke('verify-school-fees', {
                headers: {
                    'Authorization': `Bearer ${session.access_token}`
                },
                body: { reference: reference }
            });

            if (error || data.error) {
                throw error || new Error(data.error);
            }
            
            // If the backend is successful, it confirms the amount paid.
            const amountPaidInThisTransaction = data.amountPaid;

            // Update the UI with the new balance details
            const newTotalPaid = parseFloat(this.student.fees_paid) + amountPaidInThisTransaction;
            this.student.fees_paid = newTotalPaid;
            this.balanceDue = parseFloat(this.student.total_fees_due) - newTotalPaid;
            this.render();

            Swal.fire('Payment Successful!', `Your payment of ${formatCurrency(amountPaidInThisTransaction)} has been confirmed and your record has been updated.`, 'success');

        } catch (error) {
            Swal.fire('Verification Failed', error.message, 'error');
        }
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const page = new FeesManager();
    page.initialize();
});
</script>
</body>
</html>
