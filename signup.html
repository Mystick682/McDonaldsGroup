<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .brand-panel { background-color: #28a745; background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; }
        .btn-primary { background-color: #28a745; transition: background-color 0.3s ease; }
        .btn-primary:hover { background-color: #218838; }
        .input-field { background-color: #f9fafb; border-color: #d1d5db; transition: all 0.3s ease; }
        .input-field:focus { border-color: #28a745; box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.25); background-color: white; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-5xl mx-auto bg-white rounded-2xl shadow-2xl flex overflow-hidden">
        <div class="hidden md:flex md:w-1/2 brand-panel p-12 text-white flex-col justify-center">
            <h1 class="text-4xl font-bold mb-4">Join Our Community</h1>
            <p class="text-gray-200 leading-relaxed">Create your account to access your academic records, results, and important school updates.</p>
        </div>
        <div class="w-full md:w-1/2 p-8 md:p-12">
            <div class="text-center md:text-left mb-8"><h2 class="text-3xl font-bold text-gray-800">Student Registrations</h2><p class="text-gray-500">Welcome! Please fill in your details.</p></div>
            <!-- The form no longer needs an ID -->
            <form class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4">
                <div><label for="firstName" class="block text-sm font-medium text-gray-600 mb-1">First Name</label><input type="text" id="firstName" required class="input-field w-full p-3 rounded-lg text-sm"></div>
                <div><label for="lastName" class="block text-sm font-medium text-gray-600 mb-1">Last Name</label><input type="text" id="lastName" required class="input-field w-full p-3 rounded-lg text-sm"></div>
                <div><label for="dateOfBirth" class="block text-sm font-medium text-gray-600 mb-1">Date of Birth</label><input type="date" id="dateOfBirth" required class="input-field w-full p-3 rounded-lg text-sm text-gray-500"></div>
                <div><label for="admissionNumber" class="block text-sm font-medium text-gray-600 mb-1">Admission Number</label><input type="text" id="admissionNumber" required class="input-field w-full p-3 rounded-lg text-sm"></div>
                <div class="sm:col-span-2"><label for="studentClass" class="block text-sm font-medium text-gray-600 mb-1">Class</label><select id="studentClass" required class="input-field w-full p-3 rounded-lg text-sm bg-gray-50"><option value="">Select Your Current Class</option><option value="JSS 1">JSS 1</option><option value="JSS 2">JSS 2</option><option value="JSS 3">JSS 3</option><option value="SSS 1">SSS 1</option><option value="SSS 2">SSS 2</option><option value="SSS 3">SSS 3</option></select></div>
                <div class="sm:col-span-2"><label for="email" class="block text-sm font-medium text-gray-600 mb-1">Email Address</label><input type="email" id="email" required class="input-field w-full p-3 rounded-lg text-sm"></div>
                <div class="sm:col-span-2">
                    <label for="password" class="block text-sm font-medium text-gray-600 mb-1">Password</label>
                    <div class="relative"><input type="password" id="password" required class="input-field w-full p-3 rounded-lg text-sm pr-12"><div class="absolute inset-y-0 right-0 flex items-center"><button type="button" id="passwordToggleBtn" class="p-3 text-gray-400 hover:text-gray-600"><i data-lucide="eye" class="w-5 h-5"></i></button></div></div>
                </div>
                <div class="sm:col-span-2 mt-4">
                    <!-- ▼▼▼ THIS IS THE CRITICAL FIX ▼▼▼ -->
                    <button type="button" id="submitBtn" class="btn-primary w-full text-white font-bold py-3 px-6 rounded-lg transition flex items-center justify-center gap-2">
                        <span>Create Account</span>
                        <div id="spinner" class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin hidden"></div>
                    </button>
                    <!-- ▲▲▲ END OF FIX ▲▲▲ -->
                </div>
            </form>
        </div>
    </div>

<script>
const SUPABASE_URL = 'https://ldvildvshmhzgyoqbtmb.supabase.co'; // <-- IMPORTANT: REPLACE
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkdmlsZHZzaG1oemd5b3FidG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwNzAyNjgsImV4cCI6MjA3MzY0NjI2OH0.74zSvaRZWLG5bZcp3p_pzUjNJq8KAyYDuGiOlDz9IoQ'; // <-- IMPORTANT: REPLACE
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    // ▼▼▼ THIS IS THE CRITICAL FIX ▼▼▼
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.addEventListener('click', handleSignUp);
    // ▲▲▲ END OF FIX ▲▲▲
    document.getElementById('passwordToggleBtn').addEventListener('click', togglePasswordVisibility);
});

async function handleSignUp(e) {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    submitBtn.disabled = true;
    spinner.classList.remove('hidden');

    const formData = {
        firstName: document.getElementById('firstName').value, lastName: document.getElementById('lastName').value,
        dateOfBirth: document.getElementById('dateOfBirth').value, studentClass: document.getElementById('studentClass').value,
        admissionNumber: document.getElementById('admissionNumber').value, email: document.getElementById('email').value,
        password: document.getElementById('password').value,
    };
    
    try {
        const { data, error } = await supabase.functions.invoke('create-student-account', {
            body: formData,
        });
        if (error || data.error) throw error || new Error(data.error);
        
        const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
            email: formData.email,
            password: formData.password,
        });
        if (signInError) throw new Error(`Account created, but auto-login failed: ${signInError.message}`);
        
        await Swal.fire({
            icon: 'success', title: 'Registration Successful!',
            text: 'Your account has been created. Redirecting to your dashboard...',
            timer: 2000, showConfirmButton: false, allowOutsideClick: false
        });
        window.location.href = 'student-dashboard.html';

    } catch (error) {
        Swal.fire({ icon: 'error', title: 'Registration Failed', text: error.message, confirmButtonColor: '#28a745' });
    } finally {
        submitBtn.disabled = false;
        spinner.classList.add('hidden');
    }
}

function togglePasswordVisibility() {
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.querySelector('#passwordToggleBtn i');
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleIcon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
    lucide.createIcons();
}
</script>
</body>
    </html>
